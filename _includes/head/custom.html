{% include base_path %}

<!-- start custom head snippets -->

<!-- GitHub Pages ignores _headers, so enforce the portable browser policies here too. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; connect-src 'self' https://haoqi-he-research.ncgzhhq.workers.dev; font-src 'self' data:; form-action 'self'; frame-src 'self' https://challenges.cloudflare.com; img-src 'self' data: https:; object-src 'none'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<!-- <link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/> -->
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon.ico" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon.ico" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>


<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->

<!-- Allow long author links (e.g. employer) to wrap in the sidebar -->
<style>
  .sidebar .author__urls li { white-space: normal; }
</style>
